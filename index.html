<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dyskusyjny Klub Filmowy</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Mono:wght@300;400;500&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="grain-overlay"></div>

  <header>
    <div class="header-inner">
      <div class="header-logo">
        <span class="logo-dkf">DKF</span>
        <div class="logo-divider"></div>
        <div class="logo-text">
          <span class="logo-full">Dyskusyjny Klub Filmowy</span>
        </div>
        <div class="logo-divider"></div>
        <div class="logo-text">
          <span class="logo-full">Każdy piątek 19:00</span>
        </div>        
      </div>
    </div>
  </header>

  <main>
    <section class="upcoming-section">
      <div class="section-label">
        <span class="label-line"></span>
        <span class="label-text" id="label-upcoming" title="Kliknij, aby skopiować do schowka">Nadchodzące spotkania</span>
        <span class="label-line"></span>
      </div>
      <div class="cards-grid" id="upcoming-cards">
        <!-- Dynamically populated -->
      </div>
      <div class="empty-state hidden" id="upcoming-empty">
        <p>Brak zaplanowanych seansów. Wróć wkrótce.</p>
      </div>
    </section>

    <section class="download-section">
      <div class="section-label">
        <span class="label-line"></span>
        <a class="label-text label-link" href="https://drive.google.com/drive/folders/1pQmbtr6OxSjRZ9QuECT4Y2iY_wdzlDYW?usp=sharing" target="_blank" rel="noopener" title="Otwórz dysk Google">Pobieranie filmów</a>
        <span class="label-line"></span>
      </div>
      <div class="download-body">
        <a class="download-link" href="https://drive.google.com/drive/folders/1pQmbtr6OxSjRZ9QuECT4Y2iY_wdzlDYW?usp=sharing" target="_blank" rel="noopener">
          <!-- Google Drive SVG icon -->
          <svg class="drive-icon" viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/>
            <path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" fill="#00ac47"/>
            <path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.502l5.852 11.5z" fill="#ea4335"/>
            <path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/>
            <path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/>
            <path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 28h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/>
          </svg>
          <span class="download-text">Poproś o dostęp do dysku</span>
        </a>
      </div>
    </section>

    <section class="archive-section">
      <div class="section-label">
        <span class="label-line"></span>
        <span class="label-text" id="label-archive" title="Kliknij, aby skopiować do schowka">Poprzednie spotkania</span>
        <span class="label-line"></span>
      </div>
      <ul class="archive-list" id="archive-list"></ul>
      <div class="empty-state hidden" id="archive-empty">
        <p>Brak omówionych filmów.</p>
      </div>
    </section>
  </main>

  <footer>
    <p>Dyskusyjny Klub Filmowy</p>
  </footer>

  <script src="movies.js"></script>
  <script src="script.js"></script>
</body>
</html>
