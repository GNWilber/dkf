<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dyskusyjny Klub Filmowy</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Mono:wght@300;400;500&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="grain-overlay"></div>

  <header>
    <div class="header-inner">
      <div class="header-logo">
        <span class="logo-dkf">DKF</span>
        <div class="logo-divider"></div>
        <div class="logo-text">
          <span class="logo-full">Dyskusyjny Klub Filmowy</span>
        </div>
        <div class="logo-divider"></div>
        <div class="logo-text">
          <span class="logo-full">Każdy piątek 19:00</span>
        </div>        
      </div>
    </div>
  </header>

  <main>
    <section class="upcoming-section">
      <div class="section-label">
        <span class="label-line"></span>
        <span class="label-text" id="label-upcoming" title="Kliknij, aby skopiować do schowka">Nadchodzące spotkania</span>
        <span class="label-line"></span>
      </div>
      <div class="cards-grid" id="upcoming-cards">
        <!-- Dynamically populated -->
      </div>
      <div class="empty-state hidden" id="upcoming-empty">
        <p>Brak zaplanowanych seansów. Wróć wkrótce.</p>
      </div>
    </section>

    <section class="archive-section">
      <div class="section-label">
        <span class="label-line"></span>
        <span class="label-text" id="label-archive" title="Kliknij, aby skopiować do schowka">Poprzednie spotkania</span>
        <span class="label-line"></span>
      </div>
      <ul class="archive-list" id="archive-list"></ul>
      <div class="empty-state hidden" id="archive-empty">
        <p>Brak omówionych filmów.</p>
      </div>
    </section>
  </main>

  <footer>
    <p>Dyskusyjny Klub Filmowy</p>
  </footer>

  <script src="movies.js"></script>
  <script src="script.js"></script>
</body>
</html>
