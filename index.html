<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleep Request</title>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #1a1a1a;
      color: #ffffff;
      font-family: 'Ubuntu', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .center-text {
      text-align: center;
      font-size: clamp(24px, 10vw, 100px);
      text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.7);
      padding: 20px;
      max-width: 90%;
      word-wrap: break-word;
    }

    iframe {
      border-radius: 12px;
      margin: 20px; /* Added margins around the iframe */
      width: calc(100% - 40px); /* Adjust width to account for horizontal margins */
      max-width: 1500px; /* Optional: limits iframe width on larger screens */
    }
  </style>
</head>
<body>
  <div class="center-text">Sleep Request</div>
  <iframe src="https://open.spotify.com/embed/track/4dYME2vEklDwBIYYxZ1tRx?utm_source=generator&theme=0" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
</body>
</html>
